<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acme School — Examen</title>
    <link rel="icon" type="image/png" href="../assets/1988007.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/login.css" />
    <link rel="stylesheet" href="../css/examen.css" />
</head>
<body>

    <nav class="navbar-public">
        <div class="nav-brand">
            <img class="brand-logo" src="../assets/1988007.png" alt="Acme School logo" />
            <span>Acme School</span>
        </div>
        <div class="nav-actions">
            <a href="catalogo.html" class="nav-link-public">Catálogo</a>
            <a href="../index.html" class="btn btn-outline btn-sm">Iniciar sesión</a>
        </div>
    </nav>

    <main class="main">
        <section class="main_container">
            <div class="main_information">
                <div class="information">

                    <span class="record_code"></span>
                    <h1 class="record_title"></h1>
                    
                    <div class="aditional_information">
                        <p class="total_preguntas"></p>
                        <p class="approbation"></p>
                    </div>

                </div>

                <div class="timer_container">
                    <p id="timer" class="timer">00</p>
                </div>

            </div>

            <div class="lista_preguntas"></div>

            <div class="contenedor_terminar">
                <button class="btn_terminar">Terminar</button>
            </div>
        </section>
    </main>

    <div class="modal" id="modal">
        <div class="modal_contenido">
            <h2 class="modal_titulo"></h2>
            <p class="modal_porcentaje"></p>
            <p class="modal_mensaje"></p>
            <button class="modal_btn">Volver al inicio</button>
        </div>
    </div>
    <script src="../js/pages/examen.js"></script>

</body>
</html>
