<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acme School — Catálogo de Exámenes</title>
    <link rel="icon" type="image/png" href="../assets/1988007.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/catalogo.css">
</head>
<body class="general">
    <header class="header">
        <div class="header_container">
            <div class="header_brand">
                <div class="header_logo">
                    <img class="logo" src="../assets/1988007.png" alt="Acme School logo" />
                </div>
                <div class="header_title-group">
                    <span class="header_school-name">Acme School</span>
                    <span class="header_platform-type">Exams platform</span>
                </div>
            </div>

            <nav class="navbar_menu">
                <a href="catalogo.html" class="navbar_link_resolve">Resolver examen</a>
                <a href="../index.html" class="navbar_link_login">Login</a>
            </nav>

            <div class="header_acces">
                <p class="acces">Acceso publico</p>
            </div>
        </div>
    </header>

    <main class="main">
            <section class="main_container">
                <div id="catalogo" class="catalogo">
                    <div class="banner">
                        <div class="banner_content">
                            <span class="banner_tag">MÓDULO PÚBLICO</span>
                            <h1 class="banner_title">Selecciona un examen disponible</h1>
                            <p class="banner_subtitle">Elige una prueba, registra tus datos y responde dentro del tiempo establecido.</p>
                        </div>
                    </div>

                    <div class="catalogo_grid" id="catalogo_grid"></div>
                </div>
            </section>
        </main>

    <script src="../js/pages/catalogo.js"></script>
</body>
</html>
