<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acme School — Vista previa del catálogo</title>
    <link rel="icon" type="image/png" href="../assets/1988007.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/dashboard.css" />
    <link rel="stylesheet" href="../css/catalogo.css" />
</head>
<body class="dashboard-page">

    <nav class="navbar" id="navbar">
        <div class="nav-brand">
            <img class="brand-logo" src="../assets/1988007.png" alt="Acme School logo" />
            <span>Acme School</span>
        </div>
        <ul class="nav-links" id="navLinks">
            <li><a href="usuarios.html" class="nav-link">Usuarios</a></li>
            <li><a href="gestion-examenes.html" class="nav-link">Exámenes</a></li>
            <li><a href="catalogo.html" class="nav-link active">Catálogo</a></li>
        </ul>
        <div class="nav-user" id="navUser">
            <span class="nav-user-name" id="navUserName">—</span>
            <button class="btn btn-outline btn-sm" id="logoutBtn">Cerrar sesión</button>
        </div>
    </nav>

    <main class="catalogo-main">
        <section class="catalogo-container">
            <div class="banner">
                <div class="banner_content">
                    <span class="banner_tag">VISTA PREVIA — MÓDULO PÚBLICO</span>
                    <h1 class="banner_title">Exámenes disponibles para estudiantes</h1>
                    <p class="banner_subtitle">Esta es la vista que ven los estudiantes. Los cambios en exámenes se reflejan aquí de inmediato.</p>
                </div>
            </div>

            <div class="catalogo_grid" id="catalogo_grid"></div>
        </section>
    </main>

    <script type="module" src="../js/utils/storage.js"></script>
    <script type="module" src="../js/modules/auth.js"></script>
    <script src="../js/pages/catalogo.js"></script>
