<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acme School — Registro</title>
    <link rel="icon" type="image/png" href="../assets/1988007.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/main.css" />
    <link rel="stylesheet" href="../css/login.css" />
    <link rel="stylesheet" href="../css/registro.css" />
</head>
<body>

    <nav class="navbar-public">
        <div class="nav-brand">
            <img class="brand-logo" src="../assets/1988007.png" alt="Acme School logo" />
            <span>Acme School</span>
        </div>
        <div class="nav-actions">
            <a href="catalogo.html" class="nav-link-public">Buscar examen</a>
            <a href="../index.html" class="btn btn-outline btn-sm">Login</a>
        </div>
    </nav>

    <main class="main">

        <section class="main_container">

            <div class="record">
                
                <span class="record_code"></span>
                <h1 class="record_title"></h1>
                <p class="record_description">Antes de iniciar, registra los datos que quedaran asociados a tus respuestas.</p>
                <p class="record_identificacion">Número de identificación</p>
                <input type="number" class="input_identificacion">
                <p class="mensaje_error"></p>

                <div class="buttons">
                    <button class="iniciar">Iniciar Examen</button>
                    <button class="volver">Volver</button>
                </div>

            </div>


        </section>
    </main>

    <script src="../js/pages/registro.js"></script>
</body>
</html>
