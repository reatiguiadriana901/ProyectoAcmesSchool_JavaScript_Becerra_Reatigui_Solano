<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acme School — Iniciar sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body class="login-page">

  <div class="login-container">
    <div class="login-brand">
      <div class="brand-logo">A</div>
      <h1>Acme School</h1>
      <p>Plataforma de exámenes en línea</p>
    </div>

    <form class="login-form" id="loginForm" novalidate>
      <h2>Iniciar sesión</h2>

      <div class="form-group">
        <label for="loginEmail">Correo electrónico</label>
        <input
          type="email"
          id="loginEmail"
          placeholder="ejemplo@acme.edu.co"
          autocomplete="email"
          required
        />
        <span class="field-error" id="emailError"></span>
      </div>

      <div class="form-group">
        <label for="loginPassword">Contraseña</label>
        <div class="input-password">
          <input
            type="password"
            id="loginPassword"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
          <button type="button" class="toggle-pass" id="togglePass" title="Mostrar contraseña">👁</button>
        </div>
        <span class="field-error" id="passwordError"></span>
      </div>

      <div class="form-message" id="loginMessage"></div>

      <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
        Ingresar
      </button>     
    </form>
  </div>

  <!-- Seed datos iniciales y lógica de login -->
  <script type="module" src="js/utils/storage.js"></script>
  <script type="module" src="js/utils/seed.js"></script>
  <script type="module" src="js/modules/auth.js"></script>
  <script type="module" src="js/pages/login.js"></script>
</body>
</html>
