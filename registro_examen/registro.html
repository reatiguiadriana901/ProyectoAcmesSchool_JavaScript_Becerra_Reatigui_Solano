<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>registro</title>
    <link rel="stylesheet" href="registro.css">
</head>
<body class="general">
    <header class="header">
        <div class="header_container">
            <div class="header_brand">
                <div class="header_logo">
                    <span class="logo">A</span>
                </div>
                <div class="header_title-group">
                    <span class="header_school-name">Acme School</span>
                    <span class="header_platform-type">Exams platform</span>
                </div>
            </div>

            <nav class="navbar_menu">
                <a href="#/resolver" class="navbar_link_resolve">Resolver examen</a>
                <a href="#/login" class="navbar_link_login">Login</a>
            </nav>

            <div class="header_acces">
                <p class="acces">Acceso publico</p>
            </div>
        </div>
    </header>

    <main class="main">

        <section class="main_container">

            <div class="record">
                
                <span class="record_code"></span>
                <h1 class="record_title"></h1>
                <p class="record_description">Antes de iniciar, registra los datos que quedaran asociados a tus respuestas.</p>
                <p class="record_identificacion">Número de identificación</p>
                <input type="number" class="input_identificacion">
                <p class="record_nombre">Nombre Completo</p>
                <input type="text" class="input_nombre">
                <p class="mensaje_error"></p>

                <div class="buttons">
                    <button class="iniciar">Iniciar Examen</button>
                    <button class="volver">Volver</button>
                </div>

            </div>


        </section>
    </main>

    <script src="registro.js"></script>
</body>
</html>
